[file]
# Run from imputation_benchmark/CSDI.
data_prefix = ../data/adapted/TaxiBJ/fixed_0.4/channel_0/

[train]
miss_rate = 0.4
type = fixed
epochs = 100
# CSDI has full attention over nodes.  One TaxiBJ flow channel has 32*32=1024
# nodes and fits the original four-layer architecture on a 24 GB GPU.
batch_size = 1
lr = 0.0001
use_nni = 0

# Retained for the legacy loader.  The split-aware adapter preserves the
# project's train/val/test window split and does not re-split it.
test_ratio = 0.2000561955605507
val_ratio = 0.10002809778027535
sample_len = 12

[diffusion]
layers = 4
channels = 64
nheads = 8
diffusion_embedding_dim = 64
beta_start = 0.0001
beta_end = 0.5
num_steps = 100
nsample = 10
schedule = quad

[model]
timeemb = 128
featureemb = 16
target_strategy = random
